name: Release

on:
  workflow_call:
    inputs:
      build-run-id:
        description: "The run ID of the build job"
        required: true
        type: string

permissions:
  contents: read # for checkout

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      no-changes: ${{ steps.check-changes.outputs.no-changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "yarn"

      - run: yarn install --immutable

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.build-run-id }}

      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Release
        run: yarn workspaces foreach -A --topological --no-private run ci:release

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --cached --quiet; then
            echo "no-changes=true" >> $GITHUB_OUTPUT
          else
            echo "no-changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Tag
        if: steps.check-changes.outputs.no-changes != 'true'
        run: |
          git commit -m "chore: release"
          yarn workspaces foreach -A --no-private run ci:git-tag
          git push --follow-tags

  publish-github-release:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    # if: needs.release.outputs.no-changes != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "yarn"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          run-id: ${{ inputs.build-run-id }}

      - run: yarn install --immutable

      - name: Release github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: yarn workspaces foreach -A --no-private run ci:release-github

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # to enable use of OIDC for npm provenance
    # if: needs.release.outputs.no-changes != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          scope: "@wroud"
          cache: "yarn"

      - name: Setup .yarnrc.yml
        run: yarn config set npmPublishRegistry "https://registry.npmjs.org"

      - run: yarn install --immutable

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          run-id: ${{ inputs.build-run-id }}

      - name: Publish to npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn workspaces foreach -A --topological --no-private npm publish --access
          public --tolerate-republish
